name: scikit-learn compatibility

permissions:
  contents: read

concurrency:
  group: sklearn-compat-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  sklearn-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sklearn-version: '1.6.1'
          - sklearn-version: '1.7.2'
          - sklearn-version: '1.8.0'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry/virtualenvs
            ~/.cache/pip
          key: ${{ runner.os }}-sklearn-compat-${{ matrix.sklearn-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-sklearn-compat-${{ matrix.sklearn-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Override scikit-learn version
        run: poetry run pip install "scikit-learn==${{ matrix.sklearn-version }}" --force-reinstall

      - name: Print environment
        run: |
          python --version
          poetry run python -c "import sklearn; print('sklearn:', sklearn.__version__)"

      - name: Run tests
        run: poetry run pytest
